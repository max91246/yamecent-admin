services:
  nginx:
    image: nginx:1.25-alpine
    container_name: yamecent-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/sites-available:/etc/nginx/sites-available:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - php-fpm
    networks:
      - app-network

  php-fpm:
    build:
      context: ./docker/php-fpm
      dockerfile: Dockerfile
    container_name: yamecent-php-fpm
    restart: unless-stopped
    volumes:
      - .:/var/www
      - ./docker/php-fpm/php.ini:/usr/local/etc/php/php.ini:ro
    networks:
      - app-network

  mysql:
    image: mysql:8.4
    container_name: yamecent-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: yamecent
    ports:
      - "3306:3306"
    volumes:
      - /home/max91246/.laradock/data/mysql:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: yamecent-redis
    restart: unless-stopped
    command: redis-server --requirepass secret_redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: yamecent-flaresolverr
    restart: unless-stopped
    ports:
      - "8191:8191"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  redis-data:
