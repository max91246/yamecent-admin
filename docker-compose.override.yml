# 本地開發 override（自動套用）
services:
  nginx:
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/sites-available-local:/etc/nginx/sites-available:ro

  mysql:
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    ports:
      - "6379:6379"

volumes:
  mysql-data:
